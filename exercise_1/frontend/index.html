<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cat vs Dog Classifier</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="backdrop" aria-hidden="true"></div>
      <section class="panel">
        <header class="header">
          <div>
            <p class="eyebrow">MobileNet image classifier</p>
            <h1>Cat vs Dog Classifier</h1>
          </div>
          <span class="status-pill">Render API</span>
        </header>

        <label class="api-field">
          <span>Render API URL</span>
          <input id="apiUrl" type="url" placeholder="https://golden-owl-demo.onrender.com" />
        </label>

        <div class="workspace">
          <section class="input-area">
            <label class="dropzone" for="imageInput">
              <input id="imageInput" type="file" accept="image/*" />
              <span class="upload-icon">+</span>
              <span class="dropzone-title">Choose an image</span>
              <span class="dropzone-subtitle">JPG, PNG, or WEBP</span>
            </label>

            <div class="preview-wrap">
              <img id="preview" alt="" />
            </div>
          </section>

          <section id="result" class="result" aria-live="polite">
            <div>
              <p class="result-kicker">Prediction</p>
              <div class="result-label">Waiting for image</div>
            </div>

            <div class="bars">
              <div class="score-card">
                <div class="bar-row">
                  <span>Cat</span>
                  <span id="catScore">0%</span>
                </div>
                <div class="bar"><span id="catBar"></span></div>
              </div>

              <div class="score-card">
                <div class="bar-row">
                  <span>Dog</span>
                  <span id="dogScore">0%</span>
                </div>
                <div class="bar"><span id="dogBar"></span></div>
              </div>
            </div>

            <button id="predictButton" type="button" disabled>Classify image</button>
          </section>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
